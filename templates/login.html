{% extends "base.html" %}
{% block content %}
<div class="card narrow">
  <h1>Logg inn</h1>
  <form method="post">
    <label>Brukernavn<input name="username" autofocus required></label>
    <label>Passord<input name="password" type="password" required></label>
    <button type="submit">Logg inn</button>
  </form>
  <p class="hint">Glemt passord? Kontakt administrator — admin kan sette nytt passord under «Brukere».</p>
</div>
{% endblock %}
